<svg width="100%" viewBox="0 0 680 680" xmlns="http://www.w3.org/2000/svg" role="img" style="">
  <title style="fill:rgb(0, 0, 0);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">Logo blob orgánico versión final</title>
  <desc style="fill:rgb(0, 0, 0);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">Forma blob gris metálico con degradado verde esmeralda y triángulo recortado mejorado</desc>

  <defs>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="16" stdDeviation="28" flood-color="#00000035"/>
    </filter>

    <filter id="inner-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <!-- Gris metálico más rico -->
    <radialGradient id="grad" cx="42%" cy="32%" r="68%">
      <stop offset="0%" stop-color="#ececec"/>
      <stop offset="30%" stop-color="#d0d0d0"/>
      <stop offset="65%" stop-color="#b0b0b0"/>
      <stop offset="100%" stop-color="#7a7a7a"/>
    </radialGradient>

    <!-- Núcleo con más contraste -->
    <radialGradient id="core" cx="44%" cy="38%" r="60%">
      <stop offset="0%" stop-color="#d8d8d8"/>
      <stop offset="60%" stop-color="#b0b0b0"/>
      <stop offset="100%" stop-color="#888888"/>
    </radialGradient>

    <!-- Verde: suave en el medio, vibrante #13ff3e en la punta, toque esmeralda oscuro al final -->
    <linearGradient id="green-layer" x1="0" y1="0" x2="0" y2="1">
      <stop offset="18%" stop-color="#13ff3e" stop-opacity="0"/>
      <stop offset="50%" stop-color="#13ff3e" stop-opacity="0.15"/>
      <stop offset="74%" stop-color="#13ff3e" stop-opacity="0.52"/>
      <stop offset="90%" stop-color="#0ddd34" stop-opacity="0.80"/>
      <stop offset="100%" stop-color="#09b829" stop-opacity="0.95"/>
    </linearGradient>

    <!-- Brillo radial en la punta inferior -->
    <radialGradient id="green-glow" cx="50%" cy="90%" r="35%">
      <stop offset="0%" stop-color="#13ff3e" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#13ff3e" stop-opacity="0"/>
    </radialGradient>

    <!-- Highlight de luz arriba-izquierda -->
    <radialGradient id="highlight" cx="36%" cy="28%" r="38%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.38"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>

    <!-- Triángulo más elegante: vértice inferior más pronunciado -->
    <mask id="triangle-cutout">
      <rect width="100%" height="100%" fill="white"/>
      <polygon points="340,515 192,262 488,262" fill="black"/>
    </mask>

    <clipPath id="blob-clip">
      <path d="&#10;        M 340,90&#10;        C 378,85 408,112 438,128&#10;        C 472,146 510,134 542,158&#10;        C 574,182 568,222 578,258&#10;        C 588,294 614,322 610,356&#10;        C 606,390 574,414 562,448&#10;        C 550,482 562,520 534,545&#10;        C 506,570 466,558 430,568&#10;        C 394,578 360,604 324,600&#10;        C 288,596 266,564 232,554&#10;        C 198,544 156,556 132,532&#10;        C 108,508 116,468 106,434&#10;        C 96,400 68,370 72,332&#10;        C 76,294 104,268 114,234&#10;        C 124,200 116,160 144,136&#10;        C 172,112 212,124 246,118&#10;        C 280,112 308,92 340,90 Z"/>
    </clipPath>
  </defs>

  <g filter="url(#shadow)" style="fill:rgb(0, 0, 0);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">

    <!-- Blob base -->
    <path mask="url(#triangle-cutout)" d="&#10;        M 340,90&#10;        C 378,85 408,112 438,128&#10;        C 472,146 510,134 542,158&#10;        C 574,182 568,222 578,258&#10;        C 588,294 614,322 610,356&#10;        C 606,390 574,414 562,448&#10;        C 550,482 562,520 534,545&#10;        C 506,570 466,558 430,568&#10;        C 394,578 360,604 324,600&#10;        C 288,596 266,564 232,554&#10;        C 198,544 156,556 132,532&#10;        C 108,508 116,468 106,434&#10;        C 96,400 68,370 72,332&#10;        C 76,294 104,268 114,234&#10;        C 124,200 116,160 144,136&#10;        C 172,112 212,124 246,118&#10;        C 280,112 308,92 340,90 Z" fill="url(#grad)" stroke="#d8d8d8" stroke-width="3" stroke-linejoin="round" style="stroke:rgb(216, 216, 216);color:rgb(255, 255, 255);stroke-width:3px;stroke-linecap:butt;stroke-linejoin:round;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

    <!-- Núcleo con gradiente más rico -->
    <circle cx="340" cy="330" r="188" fill="url(#core)" opacity="0.92" mask="url(#triangle-cutout)" style="stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.92;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

    <!-- Capa verde degradada -->
    <g clip-path="url(#blob-clip)" mask="url(#triangle-cutout)" style="fill:rgb(0, 0, 0);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">
      <rect x="60" y="90" width="560" height="520" fill="url(#green-layer)" style="stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
    </g>

    <!-- Brillo verde radial en punta -->
    <g clip-path="url(#blob-clip)" mask="url(#triangle-cutout)" style="fill:rgb(0, 0, 0);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">
      <rect x="60" y="90" width="560" height="520" fill="url(#green-glow)" style="stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
    </g>

    <!-- Highlight de luz superior -->
    <g clip-path="url(#blob-clip)" mask="url(#triangle-cutout)" style="fill:rgb(0, 0, 0);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">
      <rect x="60" y="90" width="560" height="520" fill="url(#highlight)" style="stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
    </g>

    <!-- Borde del triángulo más visible y elegante -->
    <polygon points="340,515 192,262 488,262" fill="none" stroke="#ffffff" stroke-width="2.5" opacity="0.30" style="fill:none;stroke:rgb(255, 255, 255);color:rgb(255, 255, 255);stroke-width:2.5px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.3;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

    <!-- Pequeño brillo en el vértice inferior del triángulo -->
    <circle cx="340" cy="515" r="4" fill="#ffffff" opacity="0.25" style="fill:rgb(255, 255, 255);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.25;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
    <circle cx="192" cy="262" r="3" fill="#ffffff" opacity="0.18" style="fill:rgb(255, 255, 255);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.18;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
    <circle cx="488" cy="262" r="3" fill="#ffffff" opacity="0.18" style="fill:rgb(255, 255, 255);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.18;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  </g>
</svg>