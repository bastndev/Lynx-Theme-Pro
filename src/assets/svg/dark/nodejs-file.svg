<svg xmlns="http://www.w3.org/2000/svg" width="320" height="320" viewBox="0 0 320 320">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#439d07;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2a6604;stop-opacity:1" />
    </linearGradient>

    <mask id="hexMask">
      <path fill="white" d="m160 12 130 75v150l-130 75-130-75V87z"/>
    </mask>

    <path id="waveProp" d="M 0 250 C 80 230 120 270 200 250 C 280 230 320 270 400 250 V 320 H 0 Z" fill="rgba(255,255,255,0.3)">
      <animateTransform 
        attributeName="transform" 
        attributeType="XML" 
        type="translate" 
        from="0 0" 
        to="-200 0" 
        dur="4s" 
        repeatCount="indefinite"
        calcMode="spline"
        keySplines="0.9 0 0.2 1"/>
    </path>
  </defs>

  <path fill="url(#grad)" stroke="#2a6604" stroke-width="4" stroke-linejoin="round" d="m160 12 130 75v150l-130 75-130-75V87z"/>

  <g mask="url(#hexMask)">
    <use href="#waveProp" x="0" y="15" opacity="0.6" />
    <use href="#waveProp" x="-100" y="30" />
  </g>
</svg>
